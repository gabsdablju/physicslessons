<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f1f5f9;min-height:100vh;color:#1e293b}
button,input{font-family:inherit}
button{cursor:pointer}

/* ── INTRO ── */
.intro-wrap{min-height:100vh;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);display:flex;align-items:center;justify-content:center;padding:20px}

h1.intro-title{font-size:25px;font-weight:900;color:#1e3a5f;text-align:center}
.intro-sub{font-size:13px;color:#64748b;text-align:center;margin-top:6px}
.resume-box{margin-bottom:14px;padding:11px 14px;background:#dbeafe;border:1px solid #93c5fd;border-radius:8px;font-size:13px;color:#1e3a8a;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.field-label{display:block;font-weight:700;color:#374151;margin-bottom:6px;font-size:14px}
input[type=text]{width:100%;padding:11px 14px;border:2px solid #e2e8f0;border-radius:9px;font-size:15px;outline:none;transition:border .2s}
input[type=text]:focus{border-color:#3b82f6}
.lvl-opt{padding:13px 16px;border:2px solid #e2e8f0;border-radius:10px;margin-bottom:8px;cursor:pointer;background:#fafafa;transition:all .15s;display:flex;align-items:center;gap:12px;user-select:none}
.lvl-radio{width:20px;height:20px;border-radius:50%;border:2px solid #d1d5db;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.btn-start{width:100%;padding:14px;background:#1e3a5f;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:800;letter-spacing:.3px;transition:background .2s;margin-top:4px}
.btn-start:disabled{background:#94a3b8;cursor:not-allowed}

/* ── TOP BAR ── */
#topbar{background:#1e3a5f;color:#fff;padding:10px 16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.tb-inner{max-width:920px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.lvl-badge{padding:2px 10px;border-radius:20px;font-size:12px;font-weight:800;color:#fff}
.pb-wrap{width:90px;height:5px;background:rgba(255,255,255,.2);border-radius:3px}
.pb-fill{height:100%;border-radius:3px;transition:width .4s}
.btn-sm{padding:5px 12px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:6px;color:#fff;font-size:11px;font-weight:600;white-space:nowrap}

/* ── STATION TABS ── */
#st-tabs{max-width:920px;margin:14px auto 0;padding:0 14px;display:flex;gap:6px;overflow-x:auto;padding-bottom:4px}
.tab{padding:7px 13px;border:2px solid #e2e8f0;border-radius:8px;background:#fff;color:#374151;font-size:12px;font-weight:700;white-space:nowrap;transition:all .15s;flex-shrink:0}
.tab.active{background:#1e3a5f;border-color:#1e3a5f;color:#fff}
.tab.all-done{background:#dcfce7;border-color:#86efac;color:#15803d}

/* ── MAIN CONTENT ── */
.main{max-width:920px;margin:14px auto;padding:0 14px 40px}
.sc{background:#fff;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.07);overflow:hidden;display:none}
.sc.active{display:block}

/* ── STATION HEADER ── */
.sh{background:linear-gradient(135deg,#1e3a5f,#2d5a8e);padding:20px 24px;color:#fff}
.sh-emoji{font-size:36px;margin-bottom:4px}
.sh-title{font-size:20px;font-weight:900;margin:0}
.sh-sub{font-size:13px;opacity:.75;margin-top:3px}
.done-badge{margin-top:10px;padding:5px 14px;background:rgba(34,197,94,.2);border:1px solid rgba(134,239,172,.5);border-radius:20px;display:inline-block;font-size:13px;font-weight:700}

/* ── INFO BOXES ── */
.info-box{border-radius:10px;padding:13px 16px;margin-bottom:13px;border:1px solid}
.alt-box{background:#fffbeb;border-color:#fde68a}
.alt-box .bt{color:#92400e;font-weight:700;font-size:13px;margin-bottom:4px}
.alt-box p{color:#78350f;font-size:13px;line-height:1.65}
.lz-box .bt{font-weight:700;font-size:13px;margin-bottom:3px}
.lz-box p{font-size:13px}

/* ── TASK CARDS ── */
.tc{border:2px solid #e2e8f0;border-radius:10px;margin-bottom:11px;background:#fff;transition:border .2s,background .2s}
.tc-inner{padding:15px 18px}
.tc-row{display:flex;gap:12px;align-items:flex-start}
.chk{width:26px;height:26px;border:2px solid #d1d5db;border-radius:6px;background:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .2s;cursor:pointer;user-select:none}
.chk-mark{color:#fff;font-size:15px;font-weight:800;display:none}
.tn{font-weight:800;font-size:13px}
.tbadge{margin-left:7px;font-size:11px;padding:1px 7px;border-radius:20px;font-weight:700;border:1px solid}
.tt{margin:5px 0 10px;color:#374151;font-size:14px;line-height:1.65;white-space:pre-line}
.t-btns{display:flex;gap:8px;flex-wrap:wrap}
.btn-hint,.btn-sol{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid;transition:all .15s;min-height:32px}
.btn-hint{border-color:#fbbf24;background:#fff;color:#92400e}
.btn-hint.open{background:#fef3c7}
.btn-sol{border-color:#93c5fd;background:#fff;color:#1e40af}
.btn-sol.open{background:#eff6ff}
.hint-box,.sol-box{margin-top:11px;margin-left:38px;padding:10px 14px;border-radius:8px;font-size:13px;line-height:1.6;display:none}
.hint-box{background:#fffbeb;border:1px solid #fde68a;color:#92400e}
.sol-box{background:#f0fdf4;border:1px solid #86efac;color:#166534}
.hint-box.open,.sol-box.open{display:block}

/* ── NAV ── */
.nav-btns{display:flex;justify-content:space-between;margin-top:20px;padding-top:16px;border-top:1px solid #e2e8f0}
.btn-nav{padding:10px 20px;border:2px solid #e2e8f0;border-radius:8px;background:#fff;color:#374151;font-weight:700;font-size:14px}
.btn-nav:disabled{color:#94a3b8;background:#f8fafc;cursor:not-allowed}
.btn-navp{padding:10px 22px;background:#1e3a5f;color:#fff;border:none;border-radius:8px;font-weight:800;font-size:14px}

/* ── TEACHER PANEL ── */
.tw{max-width:920px;margin:18px auto;padding:0 14px 40px}
.tcard{background:#fff;border-radius:14px;padding:28px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:18px}
.sbox{background:#f8fafc;border-radius:9px;padding:12px 14px;border:1px solid #e2e8f0}
.slabel{font-size:12px;color:#64748b;margin-bottom:3px}
.sval{font-weight:800;font-size:17px}
.sp{margin-bottom:13px;padding:13px 15px;background:#f8fafc;border-radius:10px;border:1px solid #e2e8f0}
.sp-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.sp-name{font-weight:700;color:#1e3a5f;font-size:14px}
.pills{display:flex;flex-wrap:wrap;gap:5px}
.pill{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid}
.t-tip{margin-top:16px;padding:10px 14px;background:#fffbeb;border-radius:8px;border:1px solid #fde68a;font-size:13px;color:#713f12}
.t-actions{margin-top:18px;display:flex;gap:8px;flex-wrap:wrap}
.btn-back{padding:10px 20px;background:#1e3a5f;color:#fff;border:none;border-radius:8px;font-weight:700;font-size:14px}
.btn-print{padding:10px 20px;background:#15803d;color:#fff;border:none;border-radius:8px;font-weight:700;font-size:14px}
.btn-reset{padding:10px 18px;background:#ef4444;color:#fff;border:none;border-radius:8px;font-weight:700;font-size:13px}
.pb-bar-row{display:flex;align-items:center;gap:8px}
.pb-bar-sm{width:76px;height:5px;background:#e2e8f0;border-radius:3px;flex-shrink:0}
.pb-bar-sm-fill{height:100%;border-radius:3px}

.footer{text-align:center;font-size:12px;color:#94a3b8;margin-top:14px;padding-bottom:10px}
.sb{padding:20px 24px}

@media(max-width:600px){
  .intro-card{padding:24px 18px}
  h1.intro-title{font-size:21px}
  .sh,.sb{padding:15px 16px}
  .hint-box,.sol-box{margin-left:0;margin-top:10px}
}
@media print{
  #topbar,#st-tabs,.nav-btns,.footer,.t-actions,#btn-teacher-bar{display:none!important}
  .tcard{box-shadow:none}
  .tw{padding:0}
  body{background:#fff}
  .sp{break-inside:avoid}
}
</style>

   lz:{basis:'Ich kann die wichtigsten Atommodelle benennen und zeitlich einordnen.',

     {id:'1b1',n:1,p:true,t:'Schaue das Video zur Geschichte der Atommodelle an (QR-Code an der Station / OneNote). Fülle danach den Zeitstrahl aus: Dalton (1808) → Thomson (1897) → Rutherford (1911) → Bohr (1913). Schreibe zu jedem Modell 1 Schlüsselbegriff.',h:'Schlüsselbegriffe im Video: Kugel – Rosinenkuchen – Kern – Schalen',s:'Dalton: Atomkugel (unteilbar) | Thomson: Rosinenkuchen (Elektronen eingebettet in positive Masse) | Rutherford: Kern-Modell (Masse im kleinen positiven Kern) | Bohr: Schalenmodell (Elektronen auf festen Bahnen)'},
     {id:'1b2',n:2,p:true,t:'Beschreibe das Bohr\'sche Atommodell in 2–3 Sätzen: Wo befinden sich Elektronen, Protonen und Neutronen?',h:'Stell dir das Atom wie ein Mini-Sonnensystem vor: Was ist die "Sonne"? Was sind die "Planeten"?',s:'Im Zentrum befindet sich der Atomkern mit Protonen (+) und Neutronen (neutral). Die Elektronen (–) bewegen sich auf festen Bahnen (Schalen) um den Kern – ähnlich wie Planeten um die Sonne.'},
     {id:'1b3',n:3,p:false,t:'Was hat Rutherfords Goldfolienexperiment gezeigt? Nenne das überraschende Ergebnis und was daraus geschlossen wurde.',h:'Was hätte Thomson erwartet? Was passierte wirklich? (Manche Alpha-Teilchen wurden stark abgelenkt!)',s:'Erwartung: Alle Alpha-Teilchen fliegen durch. Überraschung: Einige wurden stark abgelenkt oder zurückgeworfen. Schluss: Die positive Ladung ist im winzigen Kern konzentriert.'}

    standard:[
     {id:'1s1',n:4,p:true,t:'Zeichne das Rutherford-Streuexperiment: Alpha-Quelle, Goldfolie, Schirm. Zeige drei verschiedene Strahlenwege (geradeaus / leicht abgelenkt / stark zurückgeworfen) und erkläre, warum sie entstehen.',h:'(1) Weit am Kern vorbei → gerade durch. (2) In Kernnähe → Ablenkung. (3) Frontaltreffer → Rückwurf durch positive Ladung im Kern.',s:'Goldfolie in der Mitte. Gerade Linie (meiste Teilchen). Gebogene Linie (nahe am Kern, elektrische Abstoßung). Zurückgeworfene Linie (direkter Treffer). → Kern: winzig und positiv.'},
     {id:'1s2',n:5,p:true,t:'Vergleiche das Thomson-Modell ("Rosinenkuchen") mit dem Rutherford-Modell in einer Tabelle: Wo ist die positive Ladung? Wo sind Elektronen? Was widerlegt welches Modell?',h:'Thomson: positive Ladung gleichmäßig verteilt, Elektronen eingebettet. Rutherford: positive Ladung im winzigen Kern konzentriert.',s:'Thomson: Ladung verteilt, Elektronen eingebettet → erklärt neutrales Atom. Rutherford: Kern (+), Elektronen außen → erklärt starke Ablenkung. Rutherfords Experiment WIDERLEGTE Thomson.'},
     {id:'1s3',n:6,p:false,t:'Warum werden Atommodelle immer wieder verändert? Erkläre am historischen Beispiel, was das über die Natur naturwissenschaftlicher Modelle aussagt.',h:'Dalton wurde durch Thomson widerlegt, Thomson durch Rutherford, Rutherford durch Bohr... Warum? Neue Experimente!',s:'Neue Experimente liefern Erkenntnisse, die alte Modelle widerlegen. Modelle sind vereinfachte Darstellungen – sie gelten, bis Experimente sie widerlegen. Grundprinzip der Naturwissenschaft: Falsifizierbarkeit.'}

     {id:'1e2',n:8,p:false,t:'Recherchiere (Schulbuch/Internet): Was kann das Bohr-Modell NICHT erklären? Was ist der Unterschied zwischen einer "Bahn" und einem "Orbital" im Quantenmodell?',h:'Stichwörter: Elektronenwolke, Aufenthaltswahrscheinlichkeit, Orbital, Heisenberg\'sche Unschärferelation',s:'Bohr versagt bei: Spektren komplexer Atome, Molekülbindungen. Quantenmodell: keine festen Bahnen, sondern Orbitale = Bereiche mit hoher Aufenthaltswahrscheinlichkeit (Elektronenwolke).'}

  {id:1,emoji:'💥',title:'Starke Kernkraft',sub:'Der "Kleber" des Atomkerns',

   lz:{basis:'Ich weiß, was die starke Kernkraft ist und warum Neutronen wichtig sind.',

   tasks:{

     {id:'2b3',n:3,p:false,t:'Erkläre in einem Satz: Warum braucht ein Atomkern Neutronen? Welche Aufgabe haben sie?',h:'Neutronen tragen zur starken Kernkraft bei, haben aber keine Ladung → verstärken den "Kleber" ohne die Abstoßung zu erhöhen.',s:'Neutronen verstärken die anziehende starke Kernkraft, ohne durch fehlende Ladung zur Abstoßung beizutragen – sie stabilisieren den Kern.'}
    ],
    standard:[

     {id:'2s2',n:5,p:true,t:'Was bedeutet "instabiler Kern"? Wann nennt man ein Atom "radioaktiv"? Nenne je ein Beispiel für ein stabiles und ein radioaktives Atom.',h:'Instabil = falsches Verhältnis N/Z → spontaner Zerfall. Radioaktiv = zerfällt spontan unter Strahlenaussendung.',s:'Instabiler Kern: falsches N/Z → spontaner Zerfall. Radioaktiv: Zerfällt unter Aussendung von Strahlung. Stabil: C-12, O-16. Radioaktiv: C-14, Uran-235.'},
     {id:'2s3',n:6,p:false,t:'Alle Elemente mit mehr als 83 Protonen (Bismut) sind radioaktiv. Erkläre warum – Tipp: Die starke Kernkraft wirkt nur auf sehr kurze Distanz!',h:'Was passiert bei sehr großen Kernen mit Protonen am "Rand"? Sie spüren die Kernkraft nur von Nachbarn, aber die elektrische Abstoßung von ALLEN Protonen.',s:'Starke Kernkraft: nur Kurzdistanz (~10⁻¹⁵ m). Bei sehr großen Kernen spüren Rand-Protonen die Kernkraft nur von Nachbarn, aber Abstoßung von allen → ab Z>83 kein stabiles N/Z mehr möglich.'}

     {id:'2e2',n:8,p:false,t:'Warum wird bei der Kernspaltung (schwere Kerne) UND bei der Kernfusion (leichte Kerne) jeweils Energie frei? Erkläre mit dem Konzept der Bindungsenergie pro Nukleon.',h:'Beide Prozesse "bewegen sich" auf der Bindungsenergie-Kurve in Richtung Eisen (Maximum). Die Differenz wird als Energie freigesetzt.',s:'Kernspaltung: schwere → leichtere Kerne (näher an Eisen) → höhere Bindungsenergie/Nukleon → Energie frei. Fusion: Leichte → schwerer. Beide Prozesse: Richtung Eisen-Maximum.'}

// STATE & PERSISTENZ
// ═══════════════════════════════════════════════════════════════════════════
var S={name:'',level:'',stIdx:0,done:{},hints:{},sols:{},teacher:false};
var _saved=null;

function loadLocal(){
  try{
    var d=JSON.parse(localStorage.getItem('lp_radio')||'null');
    if(d&&d.level&&d.name) _saved=d;
  }catch(e){}
}
function saveLocal(){
  try{ localStorage.setItem('lp_radio',JSON.stringify(S)); }catch(e){}
}
function applyState(d){
  S.name=d.name||''; S.level=d.level||''; S.stIdx=d.stIdx||0;
  S.done=d.done||{}; S.hints=d.hints||{}; S.sols=d.sols||{};
}

// ═══════════════════════════════════════════════════════════════════════════
// HILFSFUNKTIONEN
// ═══════════════════════════════════════════════════════════════════════════
function e(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function stProg(i,lv){
  var lv2=lv||S.level, ts=ST[i].tasks[lv2]||[], done=0;
  ts.forEach(function(t){if(S.done[t.id])done++;});
  return {total:ts.length,done:done};
}
function totProg(){
  var d=0,t=0;
  for(var i=0;i<ST.length;i++){var p=stProg(i);d+=p.done;t+=p.total;}
  return {done:d,total:t,pct:t?Math.round(d/t*100):0};
}

// RENDER
// ═══════════════════════════════════════════════════════════════════════════
function render(){
  var app=document.getElementById('app');
  if(!S.level){ app.innerHTML=renderIntro(); return; }
  if(S.teacher){ app.innerHTML=renderTeacher(); return; }
  app.innerHTML=renderLearn();
}

function renderIntro(){
  var resumeHtml='';
  if(_saved&&_saved.name&&_saved.level){
    resumeHtml='<div class="resume-box"><span>🔄 Gespeicherter Fortschritt: <strong>'+e(_saved.name)+'</strong> – '+e(LV[_saved.level].stars+' '+LV[_saved.level].label)+'</span><button onclick="resumeSaved()" style="padding:5px 14px;background:#1d4ed8;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer">Weiter →</button></div>';
  }
  return '<div class="intro-wrap"><div class="intro-card">'
    +'<div style="text-align:center;margin-bottom:22px">'
    +'<div style="font-size:52px;margin-bottom:8px">⚛️</div>'
    +'<h1 class="intro-title">Lernpfad Radioaktivität</h1>'
    +'<p class="intro-sub">Physik 4. Klasse &nbsp;·&nbsp; 5 Stationen &nbsp;·&nbsp; Differenziertes Stationenlernen</p>'
    +'<div style="display:flex;justify-content:center;gap:12px;margin-top:10px;flex-wrap:wrap">'
    +ST.map(function(s){return '<span style="font-size:12px;color:#94a3b8">'+s.emoji+' '+e(s.title)+'</span>';}).join('')
    +'</div></div>'
    +resumeHtml
    +'<div style="margin-bottom:16px"><label class="field-label">Dein Name:</label>'
    +'<input type="text" id="inp" placeholder="Vorname Nachname" autocomplete="off" oninput="checkStart()" style="width:100%;padding:11px 14px;border:2px solid #e2e8f0;border-radius:9px;font-size:15px;outline:none"></div>'
    +'<div style="margin-bottom:22px"><label class="field-label" style="margin-bottom:10px">Dein Niveau (von der Lehrperson zugeteilt):</label>'
    +Object.keys(LV).map(function(k){
      var c=LV[k];
      return '<div class="lvl-opt" id="lo-'+k+'" onclick="pickLevel(\''+k+'\')"><div class="lvl-radio" id="lr-'+k+'"><span id="ld-'+k+'" style="color:#fff;font-size:11px;font-weight:900;display:none">●</span></div><div><div style="font-weight:800;color:'+c.color+';font-size:15px">'+c.stars+' '+e(c.label)+'</div><div style="font-size:12px;color:#6b7280;margin-top:1px">'+e(c.desc)+'</div></div></div>';
    }).join('')
    +'</div>'
    +'<button class="btn-start" id="bstart" onclick="startNew()" disabled>Lernpfad starten →</button>'
    +'</div></div>';
}

var _pickedLevel='';
function pickLevel(k){
  _pickedLevel=k;
  Object.keys(LV).forEach(function(j){
    var c=LV[j], sel=(j===k);
    var lo=document.getElementById('lo-'+j);
    var lr=document.getElementById('lr-'+j);
    var ld=document.getElementById('ld-'+j);
    lo.style.borderColor=sel?c.color:'#e2e8f0';
    lo.style.background=sel?c.light:'#fafafa';
    lr.style.borderColor=sel?c.color:'#d1d5db';
    lr.style.background=sel?c.color:'#fff';
    ld.style.display=sel?'inline':'none';
  });
  checkStart();
}
function checkStart(){
  var inp=document.getElementById('inp');
  var btn=document.getElementById('bstart');
  if(inp&&btn) btn.disabled=!(inp.value.trim()&&_pickedLevel);
}
function startNew(){
  var inp=document.getElementById('inp');
  if(!inp||!inp.value.trim()||!_pickedLevel)return;
  S={name:inp.value.trim(),level:_pickedLevel,stIdx:0,done:{},hints:{},sols:{},teacher:false};
  saveLocal(); render();
}
function resumeSaved(){
  applyState(_saved); saveLocal(); render();
}

function renderLearn(){
  var c=LV[S.level], tp=totProg();
  var html='<div id="topbar"><div class="tb-inner">'
    +'<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">'
    +'<span style="font-size:18px">⚛️</span><span style="font-weight:700;font-size:14px">'+e(S.name)+'</span>'
    +'<span class="lvl-badge" style="background:'+c.color+'">'+c.stars+' '+e(c.label)+'</span></div>'
    +'<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">'
    +'<span id="pb-txt" style="font-size:13px;opacity:.85">'+tp.done+'/'+tp.total+' ('+tp.pct+'%)</span>'
    +'<div class="pb-wrap"><div class="pb-fill" id="pb-fill" style="width:'+tp.pct+'%;background:'+c.color+'"></div></div>'
    +'<button class="btn-sm" id="btn-teacher-bar" onclick="goTeacher()">👩‍🏫 Lehrerpanel</button>'
    +'</div></div></div>'
    +'<div id="st-tabs">'
    +ST.map(function(st,i){
      var p=stProg(i), active=(i===S.stIdx), allD=(p.done===p.total&&p.total>0);
      var cls='tab'+(active?' active':allD?' all-done':'');
      return '<button class="'+cls+'" onclick="goStation('+i+')">'+(allD?'✅':st.emoji)+' '+e(st.title)+' <span style="opacity:.7;font-size:10px">'+p.done+'/'+p.total+'</span></button>';
    }).join('')
    +'</div><div class="main">'
    +ST.map(function(st,i){
      return '<div class="sc'+(i===S.stIdx?' active':'')+'" id="sc-'+i+'">'+renderStation(st)+'</div>';
    }).join('')
    +'<p class="footer">💡 Pflicht-Aufgaben für alle verbindlich &nbsp;·&nbsp; Zusatz-Aufgaben freiwillig &nbsp;·&nbsp; Tipps und Lösungen zur Selbstkontrolle</p>'
    +'</div>';
  return html;
}

function renderStation(st){
  var c=LV[S.level], lv=S.level;
  var p=stProg(st.id), allD=(p.done===p.total&&p.total>0);
  return '<div class="sh">'
    +'<div class="sh-emoji">'+st.emoji+'</div>'
    +'<h2 class="sh-title">Station '+(st.id+1)+': '+e(st.title)+'</h2>'
    +'<p class="sh-sub">'+e(st.sub)+'</p>'
    +(allD?'<div class="done-badge">✅ Station abgeschlossen!</div>':'')
    +'</div><div class="sb">'
    +'<div class="info-box alt-box"><div class="bt">🌍 Alltagsbezug &amp; Warum du das brauchst</div><p>'+e(st.alt)+'</p></div>'
    +'<div class="info-box lz-box" style="background:'+c.light+';border-color:'+c.border+'">'
    +'<div class="bt" style="color:'+c.color+'">🎯 Mein Lernziel – '+c.stars+' '+e(c.label)+'</div>'
    +'<p style="color:'+c.dark+';font-size:13px">'+e(st.lz[lv])+'</p></div>'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:13px">'
    +'<h3 style="font-size:15px;font-weight:800;color:#1e3a5f;margin:0">📝 Aufgaben – '+c.stars+' '+e(c.label)+'</h3>'
    +'<span style="font-size:13px;color:#64748b">'+p.done+'/'+p.total+' erledigt</span></div>'
    +st.tasks[lv].map(renderTask).join('')
    +'<div class="nav-btns">'
    +'<button class="btn-nav" onclick="prevSt()"'+(st.id===0?' disabled':'')+'">← Zurück</button>'
    +(st.id<ST.length-1
      ?'<button class="btn-navp" onclick="nextSt()">Nächste Station →</button>'
      :'<button class="btn-navp" style="background:'+c.color+'" onclick="goTeacher()">🏁 Fortschritt zeigen</button>')
    +'</div></div>';
}

function renderTask(task){
  var c=LV[S.level];
  var done=!!S.done[task.id], sh=!!S.hints[task.id], ss=!!S.sols[task.id];
  return '<div class="tc" id="tc-'+task.id+'" style="'+(done?'border-color:'+c.border+';background:'+c.light:'')+'"><div class="tc-inner">'
    +'<div class="tc-row">'
    +'<div class="chk" id="chk-'+task.id+'" onclick="togDone(\''+task.id+'\')" style="border-color:'+(done?c.color:'#d1d5db')+';background:'+(done?c.color:'#fff')+'">'
    +'<span class="chk-mark" style="display:'+(done?'block':'none')+'">✓</span></div>'
    +'<div style="flex:1">'
    +'<div style="margin-bottom:4px"><span class="tn" style="color:'+c.color+'">Aufgabe '+task.n+'</span>'
    +'<span class="tbadge" style="'+(task.p?'color:'+c.color+';background:'+c.light+';border-color:'+c.border:'color:#64748b;background:#f1f5f9;border-color:#e2e8f0')+'">'+(task.p?'Pflicht':'Zusatz')+'</span></div>'
    +'<p class="tt">'+e(task.t)+'</p>'
    +'<div class="t-btns">'
    +'<button class="btn-hint'+(sh?' open':'')+'" id="bh-'+task.id+'" onclick="togHint(\''+task.id+'\')">💡 '+(sh?'Tipp ausblenden':'Tipp anzeigen')+'</button>'
    +'<button class="btn-sol'+(ss?' open':'')+'" id="bs-'+task.id+'" onclick="togSol(\''+task.id+'\')">🔍 '+(ss?'Lösung ausblenden':'Selbstkontrolle')+'</button>'
    +'</div></div></div>'
    +'<div class="hint-box'+(sh?' open':'')+'" id="hbox-'+task.id+'">💡 <strong>Tipp:</strong> '+e(task.h)+'</div>'
    +'<div class="sol-box'+(ss?' open':'')+'" id="sbox-'+task.id+'">🔍 <strong>Musterlösung:</strong> '+e(task.s)+'</div>'
    +'</div></div>';
}

function renderTeacher(){
  var c=LV[S.level], tp=totProg();
  return '<div id="topbar"><div class="tb-inner">'
    +'<div style="display:flex;align-items:center;gap:10px"><span style="font-size:18px">⚛️</span>'
    +'<span style="font-weight:700;font-size:14px">'+e(S.name)+'</span>'
    +'<span class="lvl-badge" style="background:'+c.color+'">'+c.stars+' '+e(c.label)+'</span></div>'
    +'<button class="btn-sm" onclick="backLearn()">← Zurück zum Lernpfad</button></div></div>'
    +'<div class="tw"><div class="tcard">'
    +'<h2 style="font-size:20px;font-weight:900;color:#1e3a5f;margin-bottom:5px">👩‍🏫 Lehrerpanel – Fortschrittsübersicht</h2>'
    +'<p style="font-size:13px;color:#64748b;margin-bottom:18px">Diese Ansicht der Lehrperson zeigen oder Bildschirm weiterreichen. Druckfunktion unten.</p>'
    +'<div class="sgrid">'
    +'<div class="sbox"><div class="slabel">Schüler:in</div><div class="sval" style="color:#1e3a5f">'+e(S.name)+'</div></div>'
    +'<div class="sbox"><div class="slabel">Niveau</div><div class="sval" style="color:'+c.color+'">'+c.stars+' '+e(c.label)+'</div></div>'
    +'<div class="sbox"><div class="slabel">Aufgaben</div><div class="sval" style="color:#1e3a5f">'+tp.done+'/'+tp.total+'</div></div>'
    +'<div class="sbox"><div class="slabel">Fortschritt</div><div class="sval" style="color:'+(tp.pct>=80?'#15803d':tp.pct>=50?'#1d4ed8':'#b45309')+'">'+tp.pct+'%</div></div>'
    +'</div>'
    +'<div style="height:10px;background:#e2e8f0;border-radius:5px;margin-bottom:20px">'
    +'<div style="width:'+tp.pct+'%;height:100%;background:'+c.color+';border-radius:5px;transition:width .4s"></div></div>'
    +ST.map(function(st,i){
      var p=stProg(i), tasks=st.tasks[S.level];
      var barW=p.total?Math.round(p.done/p.total*100):0;
      return '<div class="sp"><div class="sp-head"><div class="sp-name">'+st.emoji+' Station '+(st.id+1)+': '+e(st.title)+'</div>'
        +'<div class="pb-bar-row"><div class="pb-bar-sm"><div class="pb-bar-sm-fill" style="width:'+barW+'%;background:'+c.color+'"></div></div>'
        +'<span class="slabel" style="font-weight:700;color:#374151">'+p.done+'/'+p.total+'</span></div></div>'
        +'<div class="pills">'
        +tasks.map(function(t){
          var done=!!S.done[t.id];
          return '<span class="pill" style="'+(done?'color:'+c.color+';background:'+c.light+';border-color:'+c.border:'color:#94a3b8;background:#f1f5f9;border-color:#e2e8f0')+'">'
            +(done?'✓':'○')+' A'+t.n+(t.p?'':' (Z)')+'</span>';
        }).join('')
        +'</div></div>';
    }).join('')
    +'<div class="t-tip">💡 <strong>Hinweis:</strong> (P) = Pflichtaufgabe, (Z) = Zusatzaufgabe. Farbige Badges = erledigt. Seite kann gedruckt oder als PDF gespeichert werden.</div>'
    +'<div class="t-actions">'
    +'<button class="btn-back" onclick="backLearn()">← Zurück zum Lernpfad</button>'
    +'<button class="btn-print" onclick="window.print()">🖨️ Drucken / als PDF</button>'
    +'<button class="btn-reset" onclick="resetAll()">🗑️ Neu starten</button>'
    +'</div></div></div>';
}

// ═══════════════════════════════════════════════════════════════════════════
// AKTIONEN
// ═══════════════════════════════════════════════════════════════════════════
function goStation(i){ S.stIdx=i; saveLocal(); render(); }
function nextSt(){ if(S.stIdx<ST.length-1){S.stIdx++;saveLocal();render();} }
function prevSt(){ if(S.stIdx>0){S.stIdx--;saveLocal();render();} }
function goTeacher(){ S.teacher=true; saveLocal(); render(); }
function backLearn(){ S.teacher=false; render(); }

function togDone(id){
  S.done[id]=!S.done[id]; if(!S.done[id]) delete S.done[id];
  saveLocal();
  var c=LV[S.level], done=!!S.done[id];
  var tc=document.getElementById('tc-'+id);
  var chk=document.getElementById('chk-'+id);
  var mark=chk?chk.querySelector('.chk-mark'):null;
  if(tc){ tc.style.borderColor=done?c.border:'#e2e8f0'; tc.style.background=done?c.light:'#fff'; }
  if(chk){ chk.style.borderColor=done?c.color:'#d1d5db'; chk.style.background=done?c.color:'#fff'; }
  if(mark){ mark.style.display=done?'block':'none'; }
  updateProgressUI();
}

function togHint(id){
  S.hints[id]=!S.hints[id]; if(!S.hints[id]) delete S.hints[id];
  saveLocal();
  var open=!!S.hints[id];
  var box=document.getElementById('hbox-'+id);
  var btn=document.getElementById('bh-'+id);
  if(box){ box.className='hint-box'+(open?' open':''); }
  if(btn){ btn.className='btn-hint'+(open?' open':''); btn.textContent=open?'💡 Tipp ausblenden':'💡 Tipp anzeigen'; }
}

function togSol(id){
  S.sols[id]=!S.sols[id]; if(!S.sols[id]) delete S.sols[id];
  saveLocal();
  var open=!!S.sols[id];
  var box=document.getElementById('sbox-'+id);
  var btn=document.getElementById('bs-'+id);
  if(box){ box.className='sol-box'+(open?' open':''); }
  if(btn){ btn.className='btn-sol'+(open?' open':''); btn.textContent=open?'🔍 Lösung ausblenden':'🔍 Selbstkontrolle'; }
}

function updateProgressUI(){
  var tp=totProg(), c=LV[S.level];
  var fill=document.getElementById('pb-fill');
  var txt=document.getElementById('pb-txt');
  if(fill) fill.style.width=tp.pct+'%';
  if(txt) txt.textContent=tp.done+'/'+tp.total+' ('+tp.pct+'%)';
  // update tabs
  ST.forEach(function(st,i){
    var p=stProg(i), allD=(p.done===p.total&&p.total>0), active=(i===S.stIdx);
    var tabs=document.querySelectorAll('#st-tabs .tab');
    if(tabs[i]){
      tabs[i].className='tab'+(active?' active':allD?' all-done':'');
      tabs[i].innerHTML=(allD?'✅':st.emoji)+' '+e(st.title)+' <span style="opacity:.7;font-size:10px">'+p.done+'/'+p.total+'</span>';
    }
  });
}

function resetAll(){
  if(confirm('Wirklich alle Fortschritte löschen und neu starten?')){
    localStorage.removeItem('lp_radio');
    _saved=null; _pickedLevel='';
    S={name:'',level:'',stIdx:0,done:{},hints:{},sols:{},teacher:false};
    render();
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════
loadLocal();
render();
</script>
